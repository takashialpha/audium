name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: 

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]         

    steps:
    - uses: actions/checkout@v5

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    # pacman -S --noconfirm rust jack pkgconf alsa-lib     
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libasound2-dev libjack-jackd2-dev

    - name: Build
      run: cargo build --verbose

    - name: Run Tests
      run: cargo test --verbose

    - name: Clippy
      run: cargo clippy
