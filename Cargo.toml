[package]
name = "audium"
version = "1.0.0"
edition = "2024"
description = "A terminal music app"
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/takashialpha/audium"

[dependencies]
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
dirs-next = "2"
rand = "0.10"
ratatui = "0.30"
rodio = { version = "0.22", features = ["symphonia-all"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusty_ytdl = "0.7.4"
tokio = { version =  "1.52.1", features = ["full"] }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
