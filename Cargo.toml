[package]
name = "audium"
version = "0.1.0"
edition = "2024"
description = "A simple TUI audio player made in rust"
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"

[dependencies]
app_base = { git = "https://github.com/takashialpha/app_base.git" }
clap = { version = "4.5.53", features = ["derive"] }
crossterm = "0.29.0"
ratatui = "0.30.0"
rodio = "0.21.1"
thiserror = "2.0.17"

[features]

[profile.release]
strip = true
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
overflow-checks = false
incremental = false
