[package]
name = "audium"
version = "0.1.0"
edition = "2024"
description = "A simple TUI audio player made in rust"
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"

[dependencies]
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
dirs-next = "2"
ratatui = "0.30"
rodio = { version = "0.22", features = ["symphonia-all"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]

[profile.release]
strip = true
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
overflow-checks = false
incremental = false
